# Builds the Windows installer in the cloud and publishes it as a downloadable
# Release asset (StockInventory-Setup.exe). No Python needed on your own computer.
#
# Run it: GitHub repo -> Actions tab -> "Build Windows Installer" -> Run workflow.
# Then:   GitHub repo -> Releases -> download StockInventory-Setup.exe -> run it.

name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the standalone program
        run: pyinstaller StockInventory.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build the installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockInventory-Windows
          path: installer_output/*.exe

      - name: Publish installer as a Release (easy download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: Stock Inventory installer
          body: "Download StockInventory-Setup.exe below and run it on Windows. No Python required."
          files: installer_output/*.exe
